<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallMyWay</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='Image/Logo.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/program.js') }}"></script>
    <style>
        #preview {
            white-space: pre-wrap;
            background-color: #012456;
            color: #ffffff;
            padding: 15px;
            border: 1px solid #ddd;
            margin-top: 20px;
            font-family: Consolas, 'Courier New', monospace;
            border-radius: 5px;
            overflow: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .powershell-prompt {
            color: #00ff00;
        }
    </style>
    </style>
</head>

<body>
    {% include 'navbarAdmin.html' %}
    <header>
        <h1>Generador de Scripts por Cuenta</h1>
    </header>
    <main>
        <section class="container mt-3">
            <div class="row justify-content-center">
                <div class="row justify-content-center col-md-6 mb-3">
                    <label for="nombre" class="form-label"
                        style="display: flex; justify-content: center;">Nombre</label>
                    <input class="form-control" type="text" name="nombre" id="nombre"
                        style="text-align: center; width: 180px;">
                </div>
            </div>
            <div class="row justify-content-center">
                <div id="extAlta" class="col-md-6 mb-3">
                    <label for="fieldSelect" class="form-label">Extensiones de Alta</label>
                    <input class="form-control" type="number" name="fieldSelect" id="fieldSelect"
                        onchange="duplicateFields()" style="text-align: center; width: 80px;">
                </div>
            </div>
            <!-- Panel de Políticas -->
            <div id="formPoliticas" class="row justify-content-center" style="padding-top: 35px;">

                <div class="col-md-4 mb-3">
                    <div class="mb-3">
                        <label for="policySelect" class="form-label">Seleccionar cuenta:</label>
                        <select class="form-select" id="policyName" name="policyName">
                            <option value="" disabled selected>Seleccionar cuenta</option>
                            {% for id_cuenta, nombre_cuenta in accounts %}
                            <option value="{{ id_cuenta }}">{{ nombre_cuenta }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-4 mb-3" style="padding-left: 50px;">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="numeroLocalSwitch">
                        <label class="form-check-label" for="numeroLocalSwitch">Número Local</label>
                    </div>
                    <input class="form-control" style="display: none; margin-top: 20px;" type="text" id="numero">
                </div>
            </div>
            <div id="Alta" class="card shadow-sm mb-4">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Alta</h3>
                </div>
                <div class="card-body">
                    <form id="altaForm" method="POST" action="/accountScripts" class="p-4 bg-light">
                        <div class="container">
                            <div id="dynamicFieldsContainer" class="row justify-content-center"></div>
                        </div>
                        <div class="d-flex justify-content-center">
                            <button type="submit" class="btn btn-primary mt-3" style="background-color: green; border-color: green;">Generar</button>
                        </div>
                    </form>
                </div>
            </div>   
        </section>
        <section class="policy-form">
            <div id="preview" class="preview"></div>
            <a id="downloadLink" class="btn btn-success mt-3" href="#" style="display: none;">Descargar Script</a>
        </section>
    </main>
    <footer>
        <p>© 2024. Todos los derechos reservados bajo la propiedad de de CallMyWay N.Y. S.A.</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
    
            // Obtener políticas cuando se seleccione una cuenta
            document.getElementById('policyName').addEventListener('change', function () {
                const selectedAccountId = this.value;
                
                // Limpiar políticas anteriores
                document.getElementById("dynamicFieldsContainer").innerHTML = "";
    
                // Hacer solicitud para obtener las políticas de la cuenta seleccionada
                fetch(`/getPoliciesForAccount/${selectedAccountId}`)
                    .then(response => response.json())
                    .then(data => {
                        const container = document.getElementById("dynamicFieldsContainer");
    
                        // Ordenar las políticas por prioridad (asume que 'data' incluye prioridad)
                        data.policies.sort((a, b) => {
                            if (a.priority && b.priority) {
                                return a.priority - b.priority;
                            }
                            if (!a.priority) return 1;
                            if (!b.priority) return -1;
                            return 0;
                        });
    
                        // Mostrar las políticas en el DOM
                        data.policies.forEach(policy => {
                            const fieldSet = document.createElement('div');
                            fieldSet.className = 'form-check';
    
                            const input = document.createElement('input');
                            input.type = 'checkbox';
                            input.className = 'form-check-input';
                            input.name = 'policy[]';
                            input.value = policy.id;
                            input.id = `policy_${policy.id}`;
    
                            const label = document.createElement('label');
                            label.className = 'form-check-label';
                            label.htmlFor = `policy_${policy.id}`;
                            label.textContent = `${policy.name} (Prioridad: ${policy.priority || 'Sin prioridad'})`;
    
                            fieldSet.appendChild(input);
                            fieldSet.appendChild(label);
                            container.appendChild(fieldSet);
                        });
                    })
                    .catch(error => {
                        console.error('Error obteniendo políticas:', error);
                    });
            });
    
            // Manejar el formulario de "Alta" para generar el script
            document.getElementById('altaForm').addEventListener('submit', function (event) {
                event.preventDefault();
    
                const number = document.getElementById('numero').value;
                const name = document.getElementById('nombre').value;
                const policySelect = document.getElementById('policyName').value;
                
                const formData = new FormData(this);
                formData.append('numero', number);
                formData.append('nombre', name);
                formData.append('policyName', policySelect);
    
                // Obtener políticas seleccionadas
                const selectedPolicies = [];
                const checkboxes = document.querySelectorAll('#dynamicFieldsContainer input[type="checkbox"]');
                checkboxes.forEach(checkbox => {
                    if (checkbox.checked) {
                        selectedPolicies.push(checkbox.value);
                    }
                });
    
                // Añadir políticas seleccionadas al formData
                selectedPolicies.forEach(policyId => {
                    formData.append('policy[]', policyId);
                });
    
                // Enviar los datos al servidor
                fetch('/accountScripts', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.text())
                    .then(data => {
                        console.log('Success:', data);
    
                        document.getElementById("preview").textContent = data;
                        const blob = new Blob([data], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);
    
                        const downloadLink = document.getElementById('downloadLink');
                        downloadLink.href = url;
                        downloadLink.download = `${name}.ps1`;
                        downloadLink.style.display = 'inline-block';
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            });
    
            // Manejar el cambio del interruptor para mostrar/ocultar el número local
            document.getElementById('numeroLocalSwitch').addEventListener('change', function () {
                const numeroInput = document.getElementById('numero');
                if (this.checked) {
                    numeroInput.style.display = 'block';
                } else {
                    numeroInput.style.display = 'none';
                }
            });
    
        });
    </script>    
</body>

</html>
