<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallMyWay</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='Image/Logo.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/program.js') }}"></script>
    <style>
        #preview {
            white-space: pre-wrap;
            background-color: #012456;
            color: #ffffff;
            padding: 15px;
            border: 1px solid #ddd;
            margin-top: 20px;
            font-family: Consolas, 'Courier New', monospace;
            border-radius: 5px;
            overflow: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .powershell-prompt {
            color: #00ff00;
        }
    </style>
    </style>
</head>

<body>
    {% include 'navbarAdmin.html' %}
    <header>
        <h1>Generador de Scripts para MS Teams</h1>
    </header>
    <main>
        <section class="container mt-3">
            <div class="row justify-content-center">
                <div class="row justify-content-center col-md-6 mb-3">
                    <label for="nombre" class="form-label"
                        style="display: flex; justify-content: center;">Nombre</label>
                    <input class="form-control" type="text" name="nombre" id="nombre"
                        style="text-align: center; width: 180px;">
                </div>
            </div>
            <div class="row justify-content-center">
                <div id="extension-email">
                    <div id="extAlta" class="col-md-6 mb-3">
                        <label for="fieldSelect" class="form-label">Extensiones de Alta</label>
                        <input class="form-control" type="number" name="fieldSelect" id="fieldSelect"
                            onchange="duplicateFields()" style="text-align: center; width: 80px;">
                    </div>
                    <div id="extBaja" class="col-md-2 mb-6" style="display: none;">
                        <label for="fieldSelectB" class="form-label">Extensiones de Baja</label>
                        <input class="form-control" type="number" name="fieldSelectB" id="fieldSelectB"
                            onchange="duplicateFieldsB()" style="text-align: center; width: 80px;">
                    </div>
                </div>
                <div style="display: none;" id="extensionAB">
                    <div class="col-md-6 mb-3">
                        <label for="fieldSelectA" class="form-label">Extensiones de Alta</label>
                        <input class="form-control" type="number" name="fieldSelectA" id="fieldSelectA"
                            onchange="duplicateFieldsA()" style="text-align: center; width: 80px;">
                    </div>
                    <div class="col-md-2 mb-6">
                        <label for="fieldSelectAB" class="form-label">Extensiones de Baja</label>
                        <input class="form-control" type="number" name="fieldSelectAB" id="fieldSelectAB"
                            onchange="duplicateFieldsAB()" style="text-align: center; width: 80px;">
                    </div>
                </div>
            </div>
            <!-- Panel de Políticas -->
            <div id="formPoliticas" class="row justify-content-center" style="padding-top: 35px;">

                <div class="col-md-4 mb-3">
                    <div class="politicas">
                        <span class="centrar">Políticas</span>
                        <div id="policyID" class="contenedor-politica">
                        </div>
                    </div>
                </div>
                <div class="col-md-4 mb-3" style="padding-left: 50px;">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="numeroLocalSwitch">
                        <label class="form-check-label" for="numeroLocalSwitch">Número Local</label>
                    </div>
                    <input class="form-control" style="display: none; margin-top: 20px;" type="text" id="numero">
                </div>
            </div>
            <div id="formPoliticasB" class="row justify-content-center" style="padding-top: 35px; display: none;">
                <div class="col-md-4 mb-3" style="padding-left: 50px;">
                    <div class="politicasB">
                        <span class="centrar">Políticas Baja</span>
                        <div id="policyIDBaja" class="contenedor-politica-baja">
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <section class="policy-form">
            <div class="tab">
                <button class="tablinks" style="color: black;" onclick="openTab(event, 'Alta')">Alta</button>
                <button class="tablinks" style="color: black;" onclick="openTab(event, 'Baja')">Baja</button>
                <button class="tablinks" style="color: black;" onclick="openTab(event, 'AltayBaja')">Alta y
                    Baja</button>
            </div>
            <div id="Alta" class="card shadow-sm mb-4 tabcontent">
                <div class="card-body">
                    <form id="altaForm" method="POST" action="/altaUser" class="p-4 bg-light">
                        <h3 class="mb-3">Alta</h3>
                        <div class="container">
                            <div id="dynamicFieldsContainer" class="row justify-content-center"></div>
                        </div>
                        <div class="d-flex justify-content-center">
                            <button type="submit" class="btn btn-primary mt-3"
                                style="background-color: green; border-color: green;">Generar</button>
                        </div>
                    </form>
                </div>
            </div>
            <div id="Baja" class="tabcontent">
                <form id="bajaForm" method="POST" action="/bajaUser" class="p-4 rounded bg-light">
                    <h3 class="mb-3">Baja</h3>
                    <div class="container">
                        <div id="dynamicFieldsContainerB" class="row justify-content-center"></div>
                    </div>
                    <div class="d-flex justify-content-center">
                        <button type="submit" class="btn btn-primary mt-3"
                            style="background-color: green; border-color: green;">Generar</button>
                    </div>
                </form>
            </div>
            <div id="AltayBaja" class="tabcontent">
                <form id="altaBajaForm" method="POST" action="/altabajaUser" class="p-4 rounded bg-light">
                    <h3 class="mb-3">Alta y Baja</h3>
                    <div class="container">
                        <div id="dynamicFieldsContainerA" class="row justify-content-center"></div>
                        <br>
                        <div id="dynamicFieldsContainerAB" class="row justify-content-center"></div>
                    </div>
                    <div class="d-flex justify-content-center">
                        <button type="submit" class="btn btn-primary mt-3"
                            style="background-color: green; border-color: green;">Generar</button>
                    </div>
                </form>
            </div>
            <div id="preview" class="preview"></div>
            <a id="downloadLink" class="btn btn-success mt-3" href="#" download="script.ps1"
                style="display: none;">Descargar Script</a>
        </section>
    </main>
    <footer>
        <p>© 2024. Todos los derechos reservados bajo la propiedad de de CallMyWay N.Y. S.A.</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            fetch('/get-politicas')
                .then(response => response.json())
                .then(data => {
                    const contenedor = document.querySelector('.contenedor-politica');
                    data.forEach(pol => {
                        const div = document.createElement('div');
                        const input = document.createElement('input');
                        input.type = 'checkbox';
                        input.className = 'form-check-input';
                        input.name = 'opciones[]';
                        input.id = 'opciones[]';
                        input.value = pol.nombre.replace(' ', ' ');
                        if (pol.active == 1) {
                            input.checked = true;
                        }
                        const label = document.createElement('label');
                        label.className = 'form-check-label';
                        label.htmlFor = input.id;
                        label.textContent = pol.nombre;

                        div.appendChild(input);
                        div.appendChild(label);
                        contenedor.appendChild(div);
                    });
                })
                .catch(error => console.error('Error al cargar políticas:', error));

            document.getElementById('altaForm').addEventListener('submit', function (event) {
                event.preventDefault();

                const number = document.getElementById('numero').value;
                const name = document.getElementById('nombre').value;
                const checkboxes = document.querySelectorAll('.contenedor-politica input[type="checkbox"]');
                const selectedPolicies = [];

                checkboxes.forEach(checkbox => {
                    if (checkbox.checked) {
                        const policyName = checkbox.value;
                        const priority = checkbox.getAttribute('data-priority'); // Asume que tienes un atributo para la prioridad
                        selectedPolicies.push({ name: policyName, priority: priority });
                    }
                });

                selectedPolicies.sort((a, b) => {
                    // Si ambos tienen prioridad, los ordena de menor a mayor
                    if (a.priority && b.priority) {
                        return a.priority - b.priority;
                    }
                    // Si uno de ellos no tiene prioridad, lo coloca al final
                    if (!a.priority) return 1;
                    if (!b.priority) return -1;
                    return 0;
                });

                const formData = new FormData(this);
                selectedPolicies.forEach(policy => formData.append('opciones[]', policy.name));
                formData.append('nombre', name);
                formData.append('numero', number);

                fetch('/altaUser', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.text())
                    .then(data => {
                        console.log('Success:', data);

                        document.getElementById("preview").textContent = data;
                        const blob = new Blob([data], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);

                        const downloadLink = document.getElementById('downloadLink');
                        downloadLink.href = url;
                        downloadLink.download = `${name}.ps1`;
                        downloadLink.style.display = 'inline-block';
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            });
        });

        document.addEventListener('DOMContentLoaded', function () {
            fetch('/get-politicas-baja')
                .then(response => response.json())
                .then(data => {
                    const contenedor = document.querySelector('.contenedor-politica-baja');
                    data.forEach(pol => {
                        const div = document.createElement('div');
                        const input = document.createElement('input');
                        input.type = 'checkbox';
                        input.className = 'form-check-input';
                        input.name = 'opcionesB[]';
                        input.id = 'opcionesB[]';
                        input.value = pol.nombre.replace(' ', ' ');
                        if(pol.active == 1){
                            input.checked = true;
                        }
                        const label = document.createElement('label');
                        label.className = 'form-check-label';
                        label.htmlFor = input.id;
                        label.textContent = pol.nombre;

                        div.appendChild(input);
                        div.appendChild(label);
                        contenedor.appendChild(div);
                    });
                })
                .catch(error => console.error('Error al cargar políticas:', error));

            document.getElementById('bajaForm').addEventListener('submit', function (event) {
                event.preventDefault();

                const name = document.getElementById('nombre').value;
                const checkboxes = document.querySelectorAll('.contenedor-politica-baja input[type="checkbox"]');
                const selectedPolicies = [];

                checkboxes.forEach(checkbox => {
                    if (checkbox.checked) {
                        const policyName = checkbox.value;
                        const priority = checkbox.getAttribute('data-priority'); // Asegúrate de tener un atributo data-priority
                        selectedPolicies.push({ name: policyName, priority: priority });
                    }
                });

                // Ordenar primero por prioridad (ascendente), y las que no tienen prioridad se irán al final
                selectedPolicies.sort((a, b) => {
                    if (a.priority && b.priority) {
                        return a.priority - b.priority;
                    }
                    if (!a.priority) return 1;
                    if (!b.priority) return -1;
                    return 0;
                });

                const formData = new FormData(this);
                selectedPolicies.forEach(policy => formData.append('opcionesB[]', policy.name));
                formData.append('nombre', name)

                fetch('/bajaUser', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.text())
                    .then(data => {
                        console.log('Success:', data);

                        document.getElementById("preview").textContent = data;
                        const blob = new Blob([data], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);
                        downloadLink.download = `${name}.ps1`;
                        const downloadLink = document.getElementById('downloadLink');
                        downloadLink.href = url;
                        downloadLink.style.display = 'inline-block';
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });
            });
        });

        document.addEventListener('DOMContentLoaded', function () {

            document.getElementById('altaBajaForm').addEventListener('submit', function (event) {
                event.preventDefault();

                const number = document.getElementById('numero').value;
                const name = document.getElementById('nombre').value;
                const checkboxes = document.querySelectorAll('.contenedor-politica input[type="checkbox"]');
                const checkboxesB = document.querySelectorAll('.contenedor-politica-baja input[type="checkbox"]');
                const selectedPolicies = [];
                const selectedPoliciesB = [];

                checkboxes.forEach(checkbox => {
                    if (checkbox.checked) {
                        const policyName = checkbox.value;
                        const priority = checkbox.getAttribute('data-priority');
                        selectedPolicies.push({ name: policyName, priority: priority });
                    }
                });

                // Procesar políticas de Baja
                checkboxesB.forEach(checkbox => {
                    if (checkbox.checked) {
                        const policyName = checkbox.value;
                        const priority = checkbox.getAttribute('data-priority');
                        selectedPoliciesB.push({ name: policyName, priority: priority });
                    }
                });

                const formData = new FormData(this);
                selectedPolicies.forEach(policy => formData.append('opciones[]', policy.name));
                selectedPoliciesB.forEach(policyB => formData.append('opcionesB[]', policyB.name));
                formData.append('nombre', name);
                formData.append('numero', number);

                fetch('/altabajaUser', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.text())
                    .then(data => {
                        console.log('Success:', data);

                        document.getElementById("preview").textContent = data;
                        const blob = new Blob([data], { type: 'text/plain' });
                        const url = URL.createObjectURL(blob);
                        const downloadLink = document.getElementById('downloadLink');
                        downloadLink.href = url;
                        downloadLink.download = `${name}.ps1`;
                        downloadLink.style.display = 'inline-block';
                    })
                    .catch(error => {
                        console.error('Error:', error);
                    });



            });
        });
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }

            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
            const activeTabLink = document.querySelector('.tablinks.active');
            if (document.getElementById(tabName).id == 'AltayBaja') {
                document.getElementById('extension-email').style.display = "none";
                document.getElementById('extensionAB').style.display = "block";
                document.getElementById('formPoliticas').style.display = "flex";
                document.getElementById('formPoliticasB').style.display = "flex";
                document.getElementById('preview').textContent = "";
                document.getElementById('downloadLink').style.display = "none"
            } else if (document.getElementById(tabName).id == 'Baja') {
                document.getElementById('extAlta').style.display = "none";
                document.getElementById('extBaja').style.display = "block";
                document.getElementById('extension-email').style.display = "block";
                document.getElementById('extensionAB').style.display = "none";
                document.getElementById('formPoliticas').style.display = "none";
                document.getElementById('formPoliticasB').style.display = "flex";
                document.getElementById('preview').textContent = "";
                document.getElementById('downloadLink').style.display = "none"
            } else if (document.getElementById(tabName).id == 'Alta') {
                document.getElementById('extAlta').style.display = "block";
                document.getElementById('extBaja').style.display = "none";
                document.getElementById('extension-email').style.display = "block";
                document.getElementById('extensionAB').style.display = "none";
                document.getElementById('formPoliticas').style.display = "flex";
                document.getElementById('formPoliticasB').style.display = "none";
                document.getElementById('preview').textContent = "";
                document.getElementById('downloadLink').style.display = "none"
            }
        }

        window.addEventListener('load', (event) => {
            document.getElementsByClassName("tablinks")[0].click();
        });

        document.getElementById('numeroLocalSwitch').addEventListener('change', function () {
            const numeroInput = document.getElementById('numero');
            if (this.checked) {
                numeroInput.style.display = 'block';
            } else {
                numeroInput.style.display = 'none';
            }
        });


        function duplicateFieldsA() {
            const number = document.getElementById('fieldSelectA').value;
            const container = document.getElementById('dynamicFieldsContainerA');
            container.innerHTML = '';

            const altaHeader = document.createElement('h4');
            altaHeader.textContent = 'Extensiones de Alta';
            container.appendChild(altaHeader);

            for (let i = 1; i <= number; i++) {
                const fieldSet = document.createElement('div');
                fieldSet.className = 'row justify-content-center mb-3';
                fieldSet.innerHTML = `
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Correo Alta #${i}</label>
                            <input type="text" class="form-control" name="correoA[]" placeholder="Ingrese correo">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Extensión Alta #${i}</label>
                            <input type="text" class="form-control" name="extensionA[]" placeholder="Ingrese extensión">
                        </div>
                    </div>
                `;
                container.appendChild(fieldSet);
            }
        }

        function duplicateFieldsAB() {
            const number = document.getElementById('fieldSelectAB').value;
            const container = document.getElementById('dynamicFieldsContainerAB');
            container.innerHTML = '';

            const bajaHeader = document.createElement('h4');
            bajaHeader.textContent = 'Extensiones de Baja';
            container.appendChild(bajaHeader);

            for (let i = 1; i <= number; i++) {
                const fieldSet = document.createElement('div');
                fieldSet.className = 'row justify-content-center mb-3';
                fieldSet.innerHTML = `
                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label">Correo Baja #${i}</label>
                            <input type="text" class="form-control" name="correoAB[]" placeholder="Ingrese correo">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Extensión Baja #${i}</label>
                            <input type="text" class="form-control" name="extensionAB[]" placeholder="Ingrese extensión">
                        </div>
                    </div>
                `;
                container.appendChild(fieldSet);
            }
        }

    </script>
</body>

</html>
