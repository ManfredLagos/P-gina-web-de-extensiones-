<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta http-equiv="x-ua-compatible" content="ie=edge" />
  <link rel="shortcut icon" href="{{ url_for('static', filename='Image/Logo.png') }}" />
  <title>CallMyWay</title>
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0/css/all.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mdb.min.css') }}" />
</head>

<body>
  <!--Main Navigation-->
  <header>
    <style>
      #intro {
        background-image: url('/static/Image/background.webp');
        height: 100vh;
        background-size: cover;
        background-position: center;
      }

      /* Height for devices larger than 576px */
      @media (min-width: 992px) {
        #intro {
          margin-top: -58.59px;
        }
      }

      .navbar .nav-link {
        color: #fff !important;
      }

      .logo-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 35px;
      }

      .logo-image {
        max-width: 100%;
        height: auto;
        max-height: 100px;
        /* Adjust this value as needed */
      }
    </style>

    <!-- Background image -->
    <div id="intro" class="bg-image shadow-2-strong">
      <div class="mask d-flex align-items-center h-100" style="background-color: rgba(0, 0, 0, 0.8);">
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-xl-5 col-md-8">
              <form class="bg-white rounded shadow-5-strong p-5" method="POST" action="/">
                <div class="logo-container">
                  <img class="logo-image" src="static/Image/CMW.png" alt="LogoCallMyWay">
                </div>
                <div class="form-outline mb-4" data-mdb-input-init>
                  <input type="text" id="text" class="form-control" name="text" />
                  <label class="form-label" for="text">Usuario</label>
                </div>
                <div class="form-outline mb-4" data-mdb-input-init>
                  <input type="password" id="password" class="form-control" name="password" />
                  <label class="form-label" for="password">Contraseña</label>
                </div>
                <button type="submit" class="btn btn-primary btn-block" data-mdb-ripple-init>Acceder</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Background image -->
  </header>
  <!--Main Navigation-->

  <!--Footer-->
  <footer class="bg-light text-lg-start">
    <!-- Copyright -->
    <div class="text-center p-1" style="background-color: rgba(0, 0, 0, 0.2);">
      © 2024 Copyright:
      <p>Todos los derechos reservados. Call My Way S.A</p>
    </div>
    <!-- Copyright -->
  </footer>
  <!--Footer-->
  <!-- MDB -->
  <script type="text/javascript" src="{{ url_for('static', filename='js/mdb.umd.min.js') }}"></script>
</body>

</html>
