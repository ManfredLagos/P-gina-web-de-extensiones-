<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallMyWay</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='Image/Logo.png') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/program.js') }}"></script>
</head>

<body>
    {% include 'navbarUser.html' %}
    <main>
        <header>
            <h1>Generador de Contraseñas</h1>
        </header>
        <div class="container mt-5">
            <form id="passwordForm">
                <div class="row" style="padding-bottom: 10vh; padding-top: 10vh;">
                    <div class="col-md-6">
                        <div class="mb-3">
                            <label for="length" class="form-label">Longitud de la contraseña:</label>
                            <input type="number" class="form-control" id="length" name="length" min="7" required>
                        </div>
                        <div class="mb-3">
                            <label for="keyword" class="form-label">Palabra clave (opcional):</label>
                            <input type="text" class="form-control" id="keyword" name="keyword" placeholder="Ingrese una palabra clave para la contraseña">
                        </div>
                    </div>
                    <div class="col-md-6" style="padding-left: 50vh;">
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="includeUppercase" name="includeUppercase">
                            <label class="form-check-label" for="includeUppercase">Incluir mayúsculas</label>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="includeLowercase" name="includeLowercase">
                            <label class="form-check-label" for="includeLowercase">Incluir minúsculas</label>
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="includeSymbols" name="includeSymbols">
                            <label class="form-check-label" for="includeSymbols">Incluir símbolos</label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">Generar Contraseña</button>
            </form>
            <div class="modal fade" id="passwordModal" tabindex="-1" aria-labelledby="passwordModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="passwordModalLabel">Contraseña Generada</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body">
                            <div class="alert alert-success" role="alert" id="generatedPassword"></div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                            <button type="button" class="btn btn-primary" id="generateAnotherBtn">Generar otra contraseña</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <footer>
        <p>© 2024. Todos los derechos reservados bajo la propiedad de de CallMyWay N.Y. S.A.</p>
    </footer>
    <script>
        document.getElementById('passwordForm').addEventListener('submit', function(event) {
            event.preventDefault();
            generatePassword();
        });

        document.getElementById('generateAnotherBtn').addEventListener('click', function() {
            generatePassword();
        });

        const passwordModal = new bootstrap.Modal(document.getElementById('passwordModal'));

        function generatePassword() {
            const formData = new FormData(document.getElementById('passwordForm'));

            fetch('/generate_password', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('generatedPassword').textContent = data.password;
                passwordModal.show();
            })
            .catch(error => console.error('Error:', error));
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/program.js') }}"></script>
</body>

</html>
